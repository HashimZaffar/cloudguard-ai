name: cloudguard-ai

services:
  postgres:
    container_name: cloudguard-auth-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cloudguard_user
      POSTGRES_PASSWORD: cloudguard_password
      POSTGRES_DB: cloudguard_auth_db
    ports:
      - "5432:5432"
    volumes:
      - cloudguard-auth-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudguard_user -d cloudguard_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cloudguard-network

  auth-service:
    container_name: cloudguard-auth-service
    image: cloudguard-auth-service:1.0.0
    build:
      context: ../apps/auth-service
    ports:
      - "5001:5001"
    env_file:
      - ../apps/auth-service/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://cloudguard_user:cloudguard_password@postgres:5432/cloudguard_auth_db?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5001/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - cloudguard-network

  prometheus:
    container_name: cloudguard-prometheus
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - auth-service
      - alertmanager
    restart: unless-stopped
    networks:
      - cloudguard-network

  alertmanager:
    container_name: cloudguard-alertmanager
    image: prom/alertmanager:latest
    ports:
      - "9093:9093"
    volumes:
      - ../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    networks:
      - cloudguard-network
    restart: unless-stopped

  loki:
    container_name: cloudguard-loki
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    volumes:
      - ../monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - cloudguard-loki-data:/loki
    restart: unless-stopped
    networks:
      - cloudguard-network

  promtail:
    container_name: cloudguard-promtail
    image: grafana/promtail:latest
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - cloudguard-network

  grafana:
    container_name: cloudguard-grafana
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - cloudguard-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - cloudguard-network

networks:
  cloudguard-network:
    name: cloudguard-network

volumes:
  cloudguard-auth-postgres-data:
  cloudguard-grafana-data:
  cloudguard-loki-data:
