name: Auth Service Compose Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy, for example latest or sha-abc123
        required: true
        default: latest
      environment:
        description: Deployment environment name
        required: true
        default: local-compose

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    # This workflow requires a self-hosted runner.
    # A GitHub-hosted runner cannot deploy to your private local machine.
    # The self-hosted runner must have Docker and Docker Compose installed.
    runs-on: self-hosted
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        id: image-owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set deployment image
        run: echo "AUTH_SERVICE_IMAGE=ghcr.io/${{ steps.image-owner.outputs.owner }}/cloudguard-auth-service:${{ inputs.image_tag }}" >> "$GITHUB_ENV"

      - name: Check auth-service environment file
        run: |
          if [ ! -f apps/auth-service/.env ]; then
            echo "Missing apps/auth-service/.env on the deployment runner."
            echo "Create it on the self-hosted runner before deploying."
            echo "Use apps/auth-service/.env.example as a starting point, but do not commit real secrets."
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker Compose
        run: |
          docker compose -f docker/docker-compose.deploy.yml pull
          docker compose -f docker/docker-compose.deploy.yml up -d

      - name: Health check
        run: curl --fail http://localhost:5001/health

      - name: Show running containers
        run: docker ps
